<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha o Horário - Agendamento</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --card-bg: #161616;
            --accent: #39FF14;
            --accent-dim: rgba(57, 255, 20, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #888888;
            --error: #ff4b4b;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container */
        .app-container {
            width: 100%;
            max-width: 400px;
            min-height: 600px;
            background: var(--bg-color);
            position: relative;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Componentes Genéricos */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-primary {
            background: var(--accent);
            color: black;
            border: none;
            padding: 16px;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .btn-primary:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-dim);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: none;
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            font-size: 14px;
            padding: 10px;
        }

        .btn-secondary:hover {
            text-decoration: underline;
        }

        /* TELA 3: TIME SLOTS */
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .slot {
            padding: 12px;
            text-align: center;
            border: 1px solid #333;
            border-radius: var(--radius);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }

        .slot:hover:not(.booked) {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .slot.selected {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
            font-weight: bold;
        }

        .slot.booked {
            opacity: 0.3;
            text-decoration: line-through;
            pointer-events: none;
            cursor: not-allowed;
        }

        .spacer {
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- TELA 3: HORÁRIOS -->
        <section id="screen-time" class="screen">
            <h1 id="selected-date-title">Horários</h1>
            <p>Disponibilidade em tempo real para o dia selecionado.</p>

            <div class="slots-grid" id="slotsGrid">
                <!-- Gerado por JS -->
            </div>

            <div class="spacer"></div>
            <button class="btn-primary" id="btn-next-time" disabled onclick="goToStep(4)">Próximo Passo</button>
            <button class="btn-secondary" onclick="goBack()">Voltar</button>
        </section>
    </div>

    <script>
        // Estado da Aplicação
        let state = {
            step: 3,
            selectedDay: null,
            selectedTime: null,
            services: [],
            total: 0
        };

        // Horários disponíveis (8-11h e 14-18h com intervalos de 30min)
        const availableSlots = [
            '08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00',
            '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00'
        ];

        // Dados mockados de horários ocupados por dia
        // Formato: { 'dia_mes': ['08:00', '08:30', ...] }
        const bookedSlots = {
            '5_may': ['08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00'],
            '12_may': ['08:00', '08:30', '09:00'],
            '15_may': ['14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00'],
            '3_june': ['08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00'],
        };

        // Obter parâmetro da URL
        function getDateFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('date') || null;
        }

        // Renderizar slots de horário
        function renderTimeSlots() {
            const grid = document.getElementById('slotsGrid');
            grid.innerHTML = '';

            const selectedDay = state.selectedDay;
            const dayKey = selectedDay.replace(' de ', '_').toLowerCase();

            for (let time of availableSlots) {
                const slotEl = document.createElement('div');
                slotEl.classList.add('slot');
                slotEl.innerText = time;

                const isBooked = bookedSlots[dayKey]?.includes(time);

                if (isBooked) {
                    slotEl.classList.add('booked');
                } else {
                    slotEl.onclick = () => selectSlot(time, slotEl);
                }

                grid.appendChild(slotEl);
            }
        }

        function selectSlot(time, el) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
            state.selectedTime = time;
            document.getElementById('btn-next-time').disabled = false;
        }

        // Navegação
        function goToStep(step) {
            if (state.selectedTime) {
                window.location.href = `/appointments/confirmAppoint/?date=${encodeURIComponent(state.selectedDay)}&time=${encodeURIComponent(state.selectedTime)}`;
            }
        }

        function goBack() {
            window.history.back();
        }

        // Init
        function initialize() {
            state.selectedDay = getDateFromURL();
            if (state.selectedDay) {
                document.getElementById('selected-date-title').innerText = state.selectedDay;
                renderTimeSlots();
            } else {
                document.getElementById('selected-date-title').innerText = 'Erro: Data não selecionada';
            }
        }

        initialize();
    </script>
</body>
</html>
