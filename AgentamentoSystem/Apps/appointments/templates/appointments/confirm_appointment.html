<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Agendamento - STUDIO</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --card-bg: #161616;
            --accent: #39FF14;
            --accent-dim: rgba(57, 255, 20, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #888888;
            --success: #39FF14;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container */
        .app-container {
            width: 100%;
            max-width: 400px;
            min-height: 700px;
            background: var(--bg-color);
            position: relative;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Componentes Genéricos */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-primary {
            background: var(--accent);
            color: black;
            border: none;
            padding: 16px;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .btn-primary:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-dim);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: none;
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            font-size: 14px;
            padding: 10px;
        }

        .btn-secondary:hover {
            text-decoration: underline;
        }

        /* TELA 4: SERVIÇOS & RESUMO */
        .service-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 24px;
        }

        .service-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
        }

        .service-card:hover {
            border-color: var(--accent);
        }

        .service-card.selected {
            border-color: var(--accent);
            background: rgba(57, 255, 20, 0.05);
        }

        .service-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .service-info span {
            font-size: 12px;
            color: var(--text-dim);
        }

        .service-price {
            color: var(--accent);
            font-weight: 600;
            font-size: 16px;
        }

        /* FOOTER FIXO */
        .summary-panel {
            background: #111;
            border-top: 1px solid #222;
            padding: 20px;
            margin: 0 -24px -24px -24px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .total-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        /* MODAL DE SUCESSO */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease forwards;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 40px 24px;
            border-radius: var(--radius);
            text-align: center;
            max-width: 300px;
            border: 2px solid var(--success);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: scaleIn 0.5s ease forwards;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .modal-content h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--success);
        }

        .modal-content p {
            color: var(--text-main);
            font-size: 16px;
            margin-bottom: 8px;
        }

        .modal-content .schedule-info {
            background: rgba(57, 255, 20, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
            font-weight: 600;
        }

        .close-modal-btn {
            margin-top: 20px;
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .close-modal-btn:hover {
            box-shadow: 0 0 20px var(--accent-dim);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- TELA 4: SERVIÇOS & RESUMO -->
        <section id="screen-summary">
            <h1>Serviços</h1>
            <p>Selecione os tratamentos desejados.</p>

            <div class="service-list">
                <div class="service-card" onclick="toggleService(this, 'Corte Moderno', 80)">
                    <div class="service-info">
                        <h4>Corte Moderno</h4>
                        <span>45 min</span>
                    </div>
                    <div class="service-price">R$ 80</div>
                </div>

                <div class="service-card" onclick="toggleService(this, 'Barba Premium', 50)">
                    <div class="service-info">
                        <h4>Barba Premium</h4>
                        <span>30 min</span>
                    </div>
                    <div class="service-price">R$ 50</div>
                </div>

                <div class="service-card" onclick="toggleService(this, 'Tratamento Facial', 120)">
                    <div class="service-info">
                        <h4>Tratamento Facial</h4>
                        <span>60 min</span>
                    </div>
                    <div class="service-price">R$ 120</div>
                </div>

                <div class="service-card" onclick="toggleService(this, 'Massagem Relaxante', 90)">
                    <div class="service-info">
                        <h4>Massagem Relaxante</h4>
                        <span>60 min</span>
                    </div>
                    <div class="service-price">R$ 90</div>
                </div>
            </div>

            <div class="summary-panel">
                <div class="summary-row">
                    <span id="display-date">Data: -</span>
                    <span id="display-time">Hora: -</span>
                </div>
                <div class="summary-row">
                    <span>Total estimado:</span>
                    <span class="total-price" id="display-total">R$ 0</span>
                </div>
                <button class="btn-primary" style="margin-top: 10px;" onclick="confirmBooking()" id="confirm-btn" disabled>Confirmar Agendamento</button>
                <button class="btn-secondary" onclick="goBack()">Voltar</button>
            </div>
        </section>
    </div>

    <!-- MODAL DE SUCESSO -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="success-icon">✅</div>
            <h2>Agendamento Confirmado!</h2>
            <p>Seu serviço foi marcado com sucesso</p>
            <div class="schedule-info">
                <p id="modal-date">-</p>
                <p id="modal-time">-</p>
            </div>
            <button class="close-modal-btn" onclick="redirectToHome()">Voltar ao Início</button>
        </div>
    </div>

    <script>
        // Estado da Aplicação
        let state = {
            selectedDay: null,
            selectedTime: null,
            services: [],
            total: 0
        };

        // Obter parâmetros da URL
        function getParamsFromURL() {
            const params = new URLSearchParams(window.location.search);
            return {
                date: params.get('date') || null,
                time: params.get('time') || null
            };
        }

        // Alternar serviço
        function toggleService(el, name, price) {
            el.classList.toggle('selected');
            const index = state.services.findIndex(s => s.name === name);

            if (index > -1) {
                state.services.splice(index, 1);
                state.total -= price;
            } else {
                state.services.push({ name, price });
                state.total += price;
            }

            updateSummary();
        }

        // Atualizar resumo
        function updateSummary() {
            document.getElementById('display-date').innerText = `Data: ${state.selectedDay || '-'}`;
            document.getElementById('display-time').innerText = `Hora: ${state.selectedTime || '-'}`;
            document.getElementById('display-total').innerText = `R$ ${state.total}`;

            const confirmBtn = document.getElementById('confirm-btn');
            confirmBtn.disabled = state.services.length === 0;
        }

        // Confirmar agendamento
        function confirmBooking() {
            if (state.services.length === 0) {
                alert('Selecione pelo menos um serviço');
                return;
            }

            // Mostrar modal de sucesso
            document.getElementById('modal-date').innerText = `📅 ${state.selectedDay}`;
            document.getElementById('modal-time').innerText = `🕐 ${state.selectedTime}`;
            document.getElementById('successModal').classList.add('show');
        }

        // Redirecionar para home
        function redirectToHome() {
            window.location.href = '/accounts/login/';
        }

        // Voltar
        function goBack() {
            window.history.back();
        }

        // Inicializar
        function initialize() {
            const params = getParamsFromURL();
            state.selectedDay = params.date;
            state.selectedTime = params.time;
            updateSummary();
        }

        initialize();
    </script>
</body>
</html>
