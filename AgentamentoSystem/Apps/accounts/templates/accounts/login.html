<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - STUDIO</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --card-bg: #161616;
            --accent: #39FF14;
            --accent-dim: rgba(57, 255, 20, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #888888;
            --error: #ff4b4b;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container */
        .app-container {
            width: 100%;
            max-width: 400px;
            min-height: 600px;
            background: var(--bg-color);
            position: relative;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* Componentes Genéricos */
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        h2 { font-size: 28px; font-weight: 700; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }

        input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 16px;
            border-radius: var(--radius);
            color: white;
            margin-bottom: 16px;
            outline: none;
            transition: var(--transition);
        }

        input:focus { border-color: var(--accent); }

        .btn-primary {
            background: var(--accent);
            color: black;
            border: none;
            padding: 16px;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .btn-primary:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-dim);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-secondary:hover {
            text-decoration: underline;
        }

        /* LOGIN */
        .logo-area {
            text-align: center;
            margin: 60px 0;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            box-shadow: 0 0 20px var(--accent-dim);
        }

        .error-message {
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid #ff4b4b;
            color: #ff4b4b;
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- LOGIN -->
        <div class="logo-area">
            <div class="logo-circle"></div>
            <h2 style="margin-top: 15px;">STUDIO.</h2>
        </div>

        <h1>Bem-vindo</h1>
        <p>Entre para agendar seu tratamento exclusivo.</p>

        <div class="error-message" id="login-error"></div>
        {% csrf_token %}

        <input type="email" id="login-email" placeholder="E-mail">
        <input type="password" id="login-password" placeholder="Senha">

        <button class="btn-primary" onclick="handleLogin()">Login</button>
        <a href="/accounts/cadastro/" class="btn-secondary">Não tem conta? <span style="color: var(--accent);">Criar</span></a>
        <a href="/accounts/profissional/codigo/" class="btn-secondary">Sou profissional</a>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errorEl = document.getElementById('login-error');
            console.log("email:"+email);
            console.log("password:"+password);
            

            if (!email || !password) {
                showError(errorEl, 'Preencha todos os campos');
                return;
            }

            fetch('/accounts/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ email, password }),
            })
                .then((response) => response.json())
                .then((data) => {
                    if (data.success) {
                        localStorage.setItem('userEmail', data.email);
                        window.location.href = '/appointments/selectDay/';
                    } else {
                        showError(errorEl, data.error || 'E-mail ou senha incorretos');
                    }
                })
                .catch(() => showError(errorEl, 'Erro ao fazer login'));
        }

        function showError(element, message, show = true) {
            if (show) {
                element.textContent = message;
                element.classList.add('show');
            } else {
                element.classList.remove('show');
            }
        }
    </script>
</body>
</html>
